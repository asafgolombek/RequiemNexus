# SonarCloud project configuration
sonar.projectKey=asafgolombek_RequiemNexus
sonar.organization=asafgolombek

# Source and test paths
sonar.sources=src
sonar.tests=tests

# OpenCover XML reports generated by coverlet
sonar.cs.opencover.reportsPaths=**/coverage/**/coverage.opencover.xml

# 1. Global Exclusions (Removes files from the dashboard)
sonar.exclusions=src/RequiemNexus.Data/Migrations/**/*, **/obj/**, **/bin/**, **/wwwroot/lib/**

# 2. CPD Exclusions (Stops the "Duplicate Literal" warnings)
# This specifically tells Sonar to stop comparing these files for duplicated strings
sonar.cpd.exclusions=src/RequiemNexus.Data/Migrations/**/*

# 3. Test Exclusions
sonar.test.exclusions=**/bin/**, **/obj/**
# SonarCloud project configuration
# Docs: https://docs.sonarcloud.io/advanced-setup/ci-based-analysis/sonarscanner-for-net/

sonar.projectKey=asafgolombek_RequiemNexus
sonar.organization=asafgolombek

# Source and test paths
sonar.sources=src
sonar.tests=tests

# OpenCover XML reports generated by coverlet (via tests/coverage.runsettings)
sonar.cs.opencover.reportsPaths=**/coverage/**/coverage.opencover.xml

# Exclusions
sonar.exclusions=**/Migrations/**,**/obj/**,**/bin/**,**/wwwroot/lib/**
sonar.test.exclusions=**/bin/**,**/obj/**

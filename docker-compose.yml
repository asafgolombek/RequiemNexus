services:
  db:
    image: postgres:16-alpine
    container_name: requiem_nexus_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: requiem_nexus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d requiem_nexus"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:

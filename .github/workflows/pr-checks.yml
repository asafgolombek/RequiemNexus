name: PR Checks

on:
  pull_request:
    branches: [ main ]

jobs:
  pr-checks:
    name: Build, Test & Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the Grimoire
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Essential for SonarCloud and deep analysis

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true # Uses built-in v4 caching for NuGet efficiency
          cache-dependency-path: '**/packages.lock.json'


      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Install Sonar Scanner & EF Tools
        run: |
          dotnet tool install --global dotnet-sonarscanner
          dotnet tool install --global dotnet-ef

      - name: Begin SonarCloud Inquisition
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet-sonarscanner begin /k:"asafgolombek_RequiemNexus" /o:"asafgolombek" \
          /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
          /d:sonar.host.url="https://sonarcloud.io" \
          /d:sonar.cs.vscoveragexml.reportsPaths=coverage.xml \
          /d:sonar.exclusions="src/RequiemNexus.Data/Migrations/**"


      - name: Restore & Check Formatting
        run: |
          dotnet restore src/RequiemNexus.slnx
          dotnet format src/RequiemNexus.slnx --verify-no-changes

      - name: Build (Debug)
        run: dotnet build src/RequiemNexus.slnx --no-restore --configuration Debug

      - name: Run Tests with Coverage
        run: >
          dotnet test src/RequiemNexus.slnx
          --no-build
          --configuration Debug
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage
          --
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Threshold=60

      - name: End SonarCloud Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4 # Updated to v4 for current standards
        if: always()
        with:
          name: coverage-pr-${{ github.run_number }}
          path: ./coverage
          retention-days: 7

  validate-migrations:
    name: Validate DB Migrations
    needs: pr-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Install EF Tools
        run: dotnet tool install --global dotnet-ef

      - name: Restore dependencies
        run: dotnet restore src/RequiemNexus.slnx

      - name: Migration Dry-Run

        run: |
          dotnet ef database update \
          --project src/RequiemNexus.Data --startup-project src/RequiemNexus.Web \
          --connection "Data Source=/tmp/migration-test.db"
        env:
          ASPNETCORE_ENVIRONMENT: Development

  security-scan:
    name: Vulnerability Scan
    needs: pr-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore dependencies
        run: dotnet restore src/RequiemNexus.slnx

      - name: NuGet Audit

        run: |
          OUTPUT=$(dotnet list src/RequiemNexus.slnx package --vulnerable --include-transitive 2>&1)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "has the following vulnerable packages"; then
            echo "❌ Vulnerable packages detected."
            exit 1
          fi
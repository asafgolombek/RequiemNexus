name: PR Checks

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  checks:
    uses: ./.github/workflows/_checks-reusable.yml
    with:
      artifact-retention-days: 7

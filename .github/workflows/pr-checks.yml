name: PR Checks

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-checks:
    name: Build, Test & Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the Grimoire
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Essential for SonarCloud accuracy

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true # Uses built-in v4 caching for NuGet efficiency

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Install Tools
        run: |
          dotnet tool install --global dotnet-sonarscanner
          dotnet tool install --global dotnet-ef

      - name: Begin SonarCloud Inquisition
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet-sonarscanner begin /k:"Your_Project_Key" /o:"Your_Org_Name" \
          /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
          /d:sonar.host.url="https://sonarcloud.io" \
          /d:sonar.cs.vscoveragexml.reportsPaths=coverage.xml \
          /d:sonar.exclusions="src/RequiemNexus.Data/Migrations/**"

      - name: Restore & Check Formatting
        run: |
          dotnet restore src/RequiemNexus.slnx
          dotnet format src/RequiemNexus.slnx --verify-no-changes

      - name: Build (Debug Verification)
        run: dotnet build src/RequiemNexus.slnx --no-restore --configuration Debug

      - name: Run Tests with Coverage
        run: >
          dotnet test src/RequiemNexus.slnx
          --no-build
          --configuration Debug
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage
          --
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Threshold=60

      - name: End SonarCloud Analysis
        if: always()
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-pr-${{ github.run_number }}
          path: ./coverage
          retention-days: 7

  validate-migrations:
    name: Validate DB Migrations
    needs: pr-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true
      - name: Install EF Tools
        run: dotnet tool install --global dotnet-ef
      - name: Migration Dry-Run
        run: |
          # 🩸 Build explicitly before update to surface hidden 'Breaches'
          dotnet build src/RequiemNexus.slnx --configuration Debug
          dotnet ef database update \
            --project src/RequiemNexus.Data \
            --startup-project src/RequiemNexus.Web \
            --connection "Data Source=/tmp/migration-test.db"
        env:
          ASPNETCORE_ENVIRONMENT: Development

  security-scan:
    name: Vulnerability Scan
    needs: pr-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: NuGet Audit
        run: |
          OUTPUT=$(dotnet list src/RequiemNexus.slnx package --vulnerable --include-transitive 2>&1)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "has the following vulnerable packages"; then
            echo "❌ Vulnerable packages detected. Purge them before merging."
            exit 1
          fi
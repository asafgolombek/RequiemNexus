name: Container Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  scan:
    name: Scan RequiemNexus Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build local image
        run: |
          docker build -t requiem-nexus:test -f src/RequiemNexus.Web/Dockerfile .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.30.0 # Pinned for stability — 0.28.0 was incompatible with Trivy v0.56.x
        with:
          image-ref: 'requiem-nexus:test'
          format: 'table'
          output: 'trivy-results.txt'
          # 🛡️ The 'Fail-Gate' Logic
          exit-code: '1' # This 'Fails' the CI job if vulnerabilities are found
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'HIGH,CRITICAL' # 🩸 Only trigger failure on these levels

      - name: Show Trivy results
        if: always()
        run: cat trivy-results.txt || echo "No results file found"

      - name: Upload Trivy results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results
          path: trivy-results.txt
          retention-days: 90
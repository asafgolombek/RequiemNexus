name: Container Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  scan:
    name: Scan RequiemNexus Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build local image
        run: |
          docker build -t requiem-nexus:test -f src/RequiemNexus.Web/Dockerfile .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: 'requiem-nexus:test'
          format: 'table'
          exit-code: '1' # 🛡️ Fail if High/Critical vulnerabilities exist
          severity: 'HIGH,CRITICAL'

      - name: Upload Trivy results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: trivy-results
          path: trivy-results.txt # Note: trivy-action might not output to this file unless configured, but we can rely on logs.
          retention-days: 90

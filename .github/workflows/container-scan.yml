name: Container Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  scan:
    name: Scan RequiemNexus Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Build local image
        run: |
          docker build -t requiem-nexus:test -f src/RequiemNexus.Web/Dockerfile .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.36
        with:
          image-ref: 'requiem-nexus:test'
          format: 'table'
          output: 'trivy-results.txt'
          exit-code: '1' # 🛡️ Fail if High/Critical vulnerabilities exist
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true

      - name: Upload Trivy results
        uses: actions/upload-artifact@v6.0.0
        if: always()
        with:
          name: trivy-results
          path: trivy-results.txt
          retention-days: 90

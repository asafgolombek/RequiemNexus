name: Container Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  scan:
    name: Scan RequiemNexus Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build local image
        run: |
          docker build -t requiem-nexus:test -f src/RequiemNexus.Web/Dockerfile .

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.58.1

      - name: Run Trivy vulnerability scanner
        id: trivy
        continue-on-error: true  # Always continue so we can upload the results file
        run: |
          trivy image \
            --exit-code 1 \
            --ignore-unfixed \
            --vuln-type os,library \
            --severity HIGH,CRITICAL \
            --format table \
            --output trivy-results.txt \
            requiem-nexus:test

      - name: Show Trivy results
        if: always()
        run: cat trivy-results.txt || echo "No results file found"

      - name: Upload Trivy results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results
          path: trivy-results.txt
          retention-days: 90

      - name: Fail job if vulnerabilities were found
        if: steps.trivy.outcome == 'failure'
        run: |
          echo "🩸 HIGH/CRITICAL vulnerabilities detected. See trivy-results artifact for details."
          exit 1
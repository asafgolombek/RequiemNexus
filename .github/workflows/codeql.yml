name: "CodeQL Analysis"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ] # Enforce on PRs targeting main
  schedule:
    - cron: '30 1 * * 1' # Weekly scan for "Ghost" vulnerabilities

permissions:
  actions: read
  contents: read
  security-events: write # Required to post results to the Security tab

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        language: [ 'csharp' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        # build-mode: autobuild replaces the separate autobuild step (v4 handles it inline).
        # Also resolves the "build-mode undefined" warning produced by v3.
        build-mode: autobuild

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{ matrix.language }}"
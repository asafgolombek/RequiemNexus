name: Deploy

on:
  workflow_dispatch:  # Disabled: re-enable push/tags when ready to deploy

permissions:
  id-token: write # Required for AWS OIDC via configure-aws-credentials
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: Staging
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: '10.0.x'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STAGING }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Container Image
        id: push
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          DOCKER_BUILDKIT: 1
        run: |
          aws ecr create-repository --repository-name requiem-nexus --region us-east-1 2>/dev/null || true
          # Keep only the 10 most recent images — prevents unbounded ECR storage growth.
          aws ecr put-lifecycle-policy \
            --repository-name requiem-nexus \
            --region us-east-1 \
            --lifecycle-policy-text '{"rules":[{"rulePriority":1,"description":"Keep last 10 images","selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":10},"action":{"type":"expire"}}]}'
          CACHE_URI="$REGISTRY/requiem-nexus:cache"
          IMAGE_URI="$REGISTRY/requiem-nexus:$IMAGE_TAG"
          docker build \
            --cache-from "$CACHE_URI" \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            -t "$IMAGE_URI" -t "$CACHE_URI" \
            -f src/RequiemNexus.Web/Dockerfile .
          docker push "$IMAGE_URI"
          docker push "$CACHE_URI"
          echo "image-uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Install AWS CDK
        run: npm install -g aws-cdk

      - name: Build Infrastructure Project
        run: dotnet build infra/src/RequiemNexus.Infra/RequiemNexus.Infra.csproj

      - name: CDK Deploy (Staging)
        run: |
            cd infra
            cdk deploy --all --require-approval never --outputs-file outputs.json \
              --context imageUri=${{ steps.push.outputs.image-uri }} \
              --context env=staging

      - name: Extract Load Balancer URL
        id: extract_url
        shell: pwsh
        run: |
          $outputs = Get-Content infra/outputs.json | ConvertFrom-Json
          $url = $outputs.'RequiemNexus-Compute-Stack'.LoadBalancerUrl
          Write-Host "Extracted URL: $url"
          "url=$url" >> $env:GITHUB_OUTPUT

      - name: Smoke Test (Staging)
        shell: pwsh
        run: ./scripts/smoke-test.ps1 -TargetUrl "${{ steps.extract_url.outputs.url }}"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: Production
    needs: deploy-staging
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: '10.0.x'

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Container Image
        id: push
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          DOCKER_BUILDKIT: 1
        run: |
          aws ecr create-repository --repository-name requiem-nexus --region us-east-1 2>/dev/null || true
          aws ecr put-lifecycle-policy \
            --repository-name requiem-nexus \
            --region us-east-1 \
            --lifecycle-policy-text '{"rules":[{"rulePriority":1,"description":"Keep last 10 images","selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":10},"action":{"type":"expire"}}]}'
          CACHE_URI="$REGISTRY/requiem-nexus:cache"
          IMAGE_URI="$REGISTRY/requiem-nexus:$IMAGE_TAG"
          docker build \
            --cache-from "$CACHE_URI" \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            -t "$IMAGE_URI" -t "$CACHE_URI" \
            -f src/RequiemNexus.Web/Dockerfile .
          docker push "$IMAGE_URI"
          docker push "$CACHE_URI"
          echo "image-uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Install AWS CDK
        run: npm install -g aws-cdk

      - name: Build Infrastructure Project
        run: dotnet build infra/src/RequiemNexus.Infra/RequiemNexus.Infra.csproj

      - name: CDK Deploy (Production)
        run: |
          cd infra
          cdk deploy --all --require-approval never --outputs-file outputs.json \
            --context imageUri=${{ steps.push.outputs.image-uri }} \
            --context env=production

      - name: Extract Load Balancer URL (Production)
        id: extract_url_prod
        shell: pwsh
        run: |
          $outputs = Get-Content infra/outputs.json | ConvertFrom-Json
          $url = $outputs.'RequiemNexus-Compute-Stack'.LoadBalancerUrl
          Write-Host "Extracted URL: $url"
          "url=$url" >> $env:GITHUB_OUTPUT

      - name: Smoke Test (Production)
        shell: pwsh
        run: ./scripts/smoke-test.ps1 -TargetUrl "${{ steps.extract_url_prod.outputs.url }}"

name: SonarCloud Analysis

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  sonar:
    name: SonarCloud Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history required for accurate blame data and new-code detection
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install SonarCloud scanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Restore dependencies
        run: dotnet restore src/RequiemNexus.slnx

      - name: Begin SonarCloud analysis
        run: >
          dotnet sonarscanner begin
          /k:"asafgolombek_RequiemNexus"
          /o:"asafgolombek"
          /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
          /d:sonar.host.url="https://sonarcloud.io"
          /d:sonar.cs.opencover.reportsPaths="**/coverage/**/coverage.opencover.xml"
          /d:sonar.exclusions="**/Migrations/**,**/obj/**,**/bin/**,**/wwwroot/lib/**"
          /d:sonar.test.exclusions="**/bin/**,**/obj/**"

      - name: Build
        run: dotnet build src/RequiemNexus.slnx --no-restore --configuration Release

      - name: Run tests with coverage (Domain)
        run: >
          dotnet test tests/RequiemNexus.Domain.Tests/RequiemNexus.Domain.Tests.csproj
          --no-build
          --configuration Release
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage/domain
          --settings tests/coverage.runsettings

      - name: Run tests with coverage (Data)
        run: >
          dotnet test tests/RequiemNexus.Data.Tests/RequiemNexus.Data.Tests.csproj
          --no-build
          --configuration Release
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage/data
          --settings tests/coverage.runsettings

      - name: End SonarCloud analysis
        run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'src/RequiemNexus.slnx') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore src/RequiemNexus.slnx

      - name: Check formatting
        run: dotnet format src/RequiemNexus.slnx --verify-no-changes --verbosity diagnostic

      - name: Build (Release)
        run: dotnet build src/RequiemNexus.slnx --no-restore --configuration Release

      - name: Run unit tests (Domain)
        run: >
          dotnet test tests/RequiemNexus.Domain.Tests/RequiemNexus.Domain.Tests.csproj
          --no-build
          --configuration Release
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage/domain
          --settings tests/coverage.runsettings
          --
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Threshold=60
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.ThresholdType=line
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.ThresholdStat=total

      - name: Run integration tests (Data)
        run: >
          dotnet test tests/RequiemNexus.Data.Tests/RequiemNexus.Data.Tests.csproj
          --no-build
          --configuration Release
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage/data
          --settings tests/coverage.runsettings
          --
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Threshold=60
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.ThresholdType=line
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.ThresholdStat=total

      - name: Build E2E tests
        run: dotnet build tests/RequiemNexus.E2ETests/RequiemNexus.E2ETests.csproj --no-restore --configuration Release

      - name: Install Playwright browsers
        run: pwsh tests/RequiemNexus.E2ETests/bin/Release/net10.0/playwright.ps1 install --with-deps

      - name: Start Web App in Background
        run: |
          dotnet run --project src/RequiemNexus.Web/RequiemNexus.Web.csproj --configuration Release > web.log 2>&1 &
          sleep 10
        env:
          ASPNETCORE_ENVIRONMENT: E2E
          ASPNETCORE_URLS: http://localhost:5000

      - name: Run E2E tests
        run: >
          dotnet test tests/RequiemNexus.E2ETests/RequiemNexus.E2ETests.csproj
          --no-build
          --configuration Release
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage/e2e
          --settings tests/coverage.runsettings
          --
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Threshold=60
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.ThresholdType=line
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.ThresholdStat=total

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-${{ github.run_number }}
          path: ./coverage
          retention-days: 30

  validate-migrations:
    name: Validate DB Migrations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'src/RequiemNexus.slnx') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore src/RequiemNexus.slnx

      - name: Build (Release)
        run: dotnet build src/RequiemNexus.slnx --no-restore --configuration Release

      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef

      - name: Validate migrations against empty database
        run: |
          dotnet ef database update \
            --project src/RequiemNexus.Data \
            --startup-project src/RequiemNexus.Web \
            --configuration Release \
            --no-build \
            --connection "Data Source=/tmp/migration-test.db"
        env:
          ASPNETCORE_ENVIRONMENT: Development

  security-scan:
    name: Security & Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'src/RequiemNexus.slnx') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore src/RequiemNexus.slnx

      - name: Scan for vulnerable NuGet packages
        run: |
          OUTPUT=$(dotnet list src/RequiemNexus.slnx package --vulnerable --include-transitive 2>&1)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "has the following vulnerable packages"; then
            echo "❌ Vulnerable packages detected — fix them before merging."
            exit 1
          fi
          echo "✅ No vulnerable packages found."

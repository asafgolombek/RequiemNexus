name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore src/RequiemNexus.slnx

      - name: Build (Release)
        run: dotnet build src/RequiemNexus.slnx --no-restore --configuration Release

      - name: Run unit tests (Domain)
        run: >
          dotnet test tests/RequiemNexus.Domain.Tests/RequiemNexus.Domain.Tests.csproj
          --no-build
          --configuration Release
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage/domain
          --settings tests/coverage.runsettings
          --
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Threshold=60
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.ThresholdType=line
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.ThresholdStat=total

      - name: Run integration tests (Data)
        run: >
          dotnet test tests/RequiemNexus.Data.Tests/RequiemNexus.Data.Tests.csproj
          --no-build
          --configuration Release
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage/data
          --settings tests/coverage.runsettings
          --
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Threshold=60
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.ThresholdType=line
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.ThresholdStat=total

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ github.run_number }}
          path: ./coverage
          retention-days: 30

  validate-migrations:
    name: Validate DB Migrations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore src/RequiemNexus.slnx

      - name: Build (Release)
        run: dotnet build src/RequiemNexus.slnx --no-restore --configuration Release

      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef

      - name: Validate migrations against empty database
        run: |
          dotnet ef database update \
            --project src/RequiemNexus.Data \
            --startup-project src/RequiemNexus.Web \
            --connection "Data Source=/tmp/migration-test.db"
        env:
          ASPNETCORE_ENVIRONMENT: Development

  security-scan:
    name: Security & Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore src/RequiemNexus.slnx

      - name: Scan for vulnerable NuGet packages
        run: |
          OUTPUT=$(dotnet list src/RequiemNexus.slnx package --vulnerable --include-transitive 2>&1)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "has the following vulnerable packages"; then
            echo "❌ Vulnerable packages detected — fix them before merging."
            exit 1
          fi
          echo "✅ No vulnerable packages found."

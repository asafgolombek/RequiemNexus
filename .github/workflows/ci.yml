name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build, Test & Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          cache: true # Built-in caching for efficiency
          cache-dependency-path: '**/packages.lock.json'


      - name: Install EF Tools
        run: dotnet tool install --global dotnet-ef

      - name: Restore & Check Formatting
        run: |
          dotnet restore tests/RequiemNexus.Tests.slnx
          dotnet format tests/RequiemNexus.Tests.slnx --verify-no-changes

      - name: Build (Release)
        run: dotnet build tests/RequiemNexus.Tests.slnx --no-restore --configuration Release /p:TreatWarningsAsErrors=true

      - name: Run Domain & Logic Tests
        run: >
          dotnet test tests/RequiemNexus.Tests.slnx
          --no-build
          --configuration Release
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage
          --
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Threshold=60


      - name: Upload Coverage Artifacts
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: coverage-${{ github.run_number }}
          path: ./coverage
          retention-days: 30

  validate-migrations:
    name: Validate DB Migrations
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Install EF Tools
        run: dotnet tool install --global dotnet-ef

      - name: Restore dependencies
        run: dotnet restore tests/RequiemNexus.Tests.slnx

      - name: Build (Diagnostic)
        run: dotnet build tests/RequiemNexus.Tests.slnx --configuration Debug --verbosity diagnostic

      - name: Migration Dry-Run
        run: |
          dotnet ef database update \
          --project src/RequiemNexus.Data --startup-project src/RequiemNexus.Web \
          --connection "Data Source=/tmp/migration-test.db" --verbose
        env:
          ASPNETCORE_ENVIRONMENT: Development

  security-scan:
    name: Vulnerability Scan
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore dependencies
        run: dotnet restore tests/RequiemNexus.Tests.slnx

      - name: NuGet Audit

        run: |
          OUTPUT=$(dotnet list tests/RequiemNexus.Tests.slnx package --vulnerable --include-transitive 2>&1)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "has the following vulnerable packages"; then
            echo "❌ Vulnerable packages detected."
            exit 1
          fi
          echo "✅ No vulnerable packages found."
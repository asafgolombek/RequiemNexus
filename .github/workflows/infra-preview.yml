name: Infrastructure Preview

on:
  pull_request:
    paths:
      - 'infra/**'
      - '.github/workflows/infra-preview.yml'

permissions:
  id-token: write # Required for AWS OIDC
  contents: read
  pull-requests: write

jobs:
  cdk-diff:
    name: CDK Diff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: '10.0.x'

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STAGING }}
          aws-region: us-east-1

      - name: Install AWS CDK
        run: npm install -g aws-cdk

      - name: Build Infrastructure Project
        run: dotnet build infra/src/RequiemNexus.Infra/RequiemNexus.Infra.csproj
        
      - name: CDK Diff
        id: cdk-diff
        run: |
          cd infra
          cdk diff 2>&1 | tee cdk_diff.txt
          
      - name: Comment on PR
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const diffOutput = fs.readFileSync('infra/cdk_diff.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Infrastructure Preview (CDK Diff)\n\`\`\`\n${diffOutput}\n\`\`\``
            })
